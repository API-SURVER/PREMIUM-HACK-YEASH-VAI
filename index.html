        <div id="statusDisplay">

    <script>
        // Firebase Configuration (Admin panel এর same)
        const firebaseConfig = {
            apiKey: "AIzaSyDvaeb6vPj04PFbYS3KKLG1t-ieKBctybM",
            authDomain: "axersx-f8a4c.firebaseapp.com",
            databaseURL: "https://axersx-f8a4c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "axersx-f8a4c",
            storageBucket: "axersx-f8a4c.firebasestorage.app",
            messagingSenderId: "458175980328",
            appId: "1:458175980328:web:0fac6ff570789afdb1a61d",
            measurementId: "G-Q6MG6BXYC7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Global variables
        let serverStatus = false;
        let gameStatus = false;
        let validPasswords = [];
        let currentUserActive = false;
        let loggedInPassword = '';
        let predictionInterval = null;

        // --- DRAG LOGIC (unchanged) ---
        const box = document.getElementById('signal-box');
        let isDragging = false;
        let offsetX, offsetY;

        const startDrag = (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
            isDragging = true;
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            offsetX = clientX - box.offsetLeft;
            offsetY = clientY - box.offsetTop;
            box.style.transform = 'none';
            e.preventDefault();
        };

        const doDrag = (e) => {
            if (!isDragging) return;
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            box.style.left = (clientX - offsetX) + 'px';
            box.style.top = (clientY - offsetY) + 'px';
            e.preventDefault();
        };

        box.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', () => isDragging = false);
        box.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', doDrag, {passive: false});
        document.addEventListener('touchend', () => isDragging = false);

        // --- FIREBASE LISTENERS ---
        
        // Server status listener
        db.ref("server").on("value", (snap) => {
            serverStatus = snap.val() === true;
            updateStatusDisplay();
            updateLoginButton();
            updateOffMessages();
            
            if (!serverStatus) {
                // Server off হলে logout করে দিবে
                logoutUser();
            }
        });

        // Game status listener
        db.ref("game").on("value", (snap) => {
            gameStatus = snap.val() === true;
            updateStatusDisplay();
            updateLoginButton();
            updateOffMessages();
            
            if (!gameStatus) {
                // Game off হলে prediction বন্ধ করে দিবে
                stopPredictions();
                document.getElementById('hack-content').style.display = 'none';
            } else {
                // Game on হলে prediction চালু করবে যদি user logged in থাকে
                if (currentUserActive && document.getElementById('hack-content').style.display === 'block') {
                    startPredictions();
                }
            }
        });

        // Load all valid passwords
        function loadPasswords() {
            db.ref("passwords").on("value", (snap) => {
                validPasswords = [];
                snap.forEach(child => {
                    const passData = child.val();
                    if (passData.active === true) {
                        validPasswords.push({
                            password: passData.password,
                            key: child.key,
                            active: passData.active,
                            expiry: passData.expiry
                        });
                    }
                });
                
                // Check if current logged in password is still valid
                if (loggedInPassword) {
                    const isValid = validPasswords.some(p => p.password === loggedInPassword && p.active === true);
                    if (!isValid) {
                        logoutUser();
                        alert("Your password has been deactivated by admin!");
                    }
                }
            });
        }

        loadPasswords();

        // --- UI UPDATE FUNCTIONS ---
        function updateStatusDisplay() {
            document.getElementById('serverStatus').innerHTML = serverStatus ? '✅ SERVER' : '🔴 SERVER';
            document.getElementById('serverStatus').style.color = serverStatus ? '#44ff88' : '#ff4444';
            
            document.getElementById('gameStatus').innerHTML = gameStatus ? '✅ GAME' : '⚠️ GAME';
            document.getElementById('gameStatus').style.color = gameStatus ? '#44ff88' : '#ffaa00';
        }

        function updateOffMessages() {
            document.getElementById('serverOffMessage').style.display = serverStatus ? 'none' : 'block';
            document.getElementById('gameOffMessage').style.display = gameStatus ? 'none' : 'block';
        }

        function updateLoginButton() {
            const loginBtn = document.getElementById('loginBtn');
            if (!serverStatus || !gameStatus) {
                loginBtn.disabled = true;
                loginBtn.style.background = '#444';
                document.getElementById('passValidMessage').innerText = '⏳ Offline';
            } else {
                loginBtn.disabled = false;
                loginBtn.style.background = '#00ff00';
                document.getElementById('passValidMessage').innerText = '';
            }
        }

        // --- PASSWORD CHECK ---
        function checkAccess() {
            if (!serverStatus || !gameStatus) {
                alert("Server or Game is offline! Please wait.");
                return;
            }

            const enteredPass = document.getElementById('passInput').value.trim();
            
            if (!enteredPass) {
                alert("Enter password");
                return;
            }

            // Check if password exists and is active
            const validPass = validPasswords.find(p => p.password === enteredPass && p.active === true);
            
            if (validPass) {
                // Check expiry
                if (validPass.expiry && validPass.expiry < Date.now()) {
                    alert("Password expired!");
                    return;
                }
                
                loggedInPassword = enteredPass;
                currentUserActive = true;
                
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('hack-content').style.display = 'block';
                
                if (gameStatus) {
                    startPredictions();
                } else {
                    document.getElementById('predict-res').innerText = 'GAME OFF';
                }
            } else {
                alert("WRONG PASSWORD OR INACTIVE");
            }
        }

        function logoutUser() {
            loggedInPassword = '';
            currentUserActive = false;
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('hack-content').style.display = 'none';
            document.getElementById('passInput').value = '';
            stopPredictions();
        }

        // --- PREDICTION FUNCTIONS ---
        function startPredictions() {
            if (predictionInterval) clearInterval(predictionInterval);
            
            const list = ["BIG 7,9", "SMALL 0,2", "SMALL 1,3", "BIG 6,8", "SMALL 2,4", "BIG 5,9"];

            predictionInterval = setInterval(() => {
                if (!gameStatus) {
                    stopPredictions();
                    return;
                }

                const now = new Date();
                const ms = now.getTime();

                let p = Math.floor(ms / 30000);
                let seed = p * 1.234;
                let idx = Math.floor(Math.abs(Math.sin(seed) * list.length)) % list.length;

                let resultData = list[idx].split(' ');
                let resultText = resultData[0];
                let luckyNums = resultData[1];

                const resEl = document.getElementById('predict-res');
                resEl.innerText = resultText;
                resEl.style.color = resultText === "BIG" ? "#00ffff" : "#ff00ff";
                document.getElementById('lucky-pair').innerText = luckyNums;

                const totalSec = now.getSeconds();
                const remaining = totalSec >= 30 ? 60 - totalSec : 30 - totalSec;
                document.getElementById('seconds').innerText = remaining;

            }, 1000);
        }

        function stopPredictions() {
            if (predictionInterval) {
                clearInterval(predictionInterval);
                predictionInterval = null;
            }
            document.getElementById('predict-res').innerText = 'OFF';
            document.getElementById('lucky-pair').innerText = '-- & --';
        }

        // Initial update
        updateStatusDisplay();
        updateOffMessages();
    </script>
